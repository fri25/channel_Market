services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: runtime
      args:
        user: channelmarket
        uid: ${UID:-1001}
    restart: unless-stopped
    working_dir: /var/www
    user: "${UID:-1001}:${GID:-1001}"
    volumes:
      - ./:/var/www:cached
      - app-storage:/var/www/storage
      - app-logs:/var/www/storage/logs
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_CONNECTION=mysql
      - DB_DATABASE=${DB_DATABASE:-channel_market_prod}
      - DB_USERNAME=${DB_USERNAME:-cm_db_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - RUN_MIGRATIONS=true
    networks:
      - internal
    dns:
      - 8.8.8.8
      - 8.8.4.4
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "cgi-fcgi", "-bind", "-connect", "127.0.0.1:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Queue Worker
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: runtime
      args:
        uid: ${UID:-1001}
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    user: "${UID:-1001}:${GID:-1001}"
    volumes:
      - .:/var/www
      - app-storage:/var/www/storage
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_CONNECTION=mysql
      - DB_DATABASE=${DB_DATABASE:-channel_market_prod}
      - DB_USERNAME=${DB_USERNAME:-cm_db_user}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'artisan queue:work' | grep -v grep"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - app

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: runtime
      args:
        uid: ${UID:-1001}
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    user: "${UID:-1001}:${GID:-1001}"
    volumes:
      - .:/var/www
      - app-storage:/var/www/storage
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_CONNECTION=mysql
      - DB_DATABASE=${DB_DATABASE:-channel_market_prod}
      - DB_USERNAME=${DB_USERNAME:-cm_db_user}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep 'artisan schedule:work' | grep -v grep"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - app

  # Nginx Web Server
  webserver:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.channelmarket-web.rule=Host(`${APP_DOMAIN:-channelmarket.net}`)"
      - "traefik.http.routers.channelmarket-web.entrypoints=websecure"
      - "traefik.http.routers.channelmarket-web.tls.certresolver=letsencrypt"
      - "traefik.docker.network=proxy"
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  # Database
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-channel_market_prod}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME:-cm_db_user}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - internal
    dns:
      - 8.8.8.8
      - 8.8.4.4
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Email Testing (Mailpit)
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    volumes:
      - mailpit-data:/data
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.channelmarket-mail.rule=Host(`mail.${APP_DOMAIN:-channelmarket.net}`)"
      - "traefik.http.routers.channelmarket-mail.entrypoints=websecure"
      - "traefik.http.routers.channelmarket-mail.tls.certresolver=letsencrypt"
      - "traefik.http.services.channelmarket-mail.loadbalancer.server.port=8025"
      - "traefik.docker.network=proxy"
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'sleep 1; printf \"\" > /dev/tcp/127.0.0.1/1025' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

  # Database Management
  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - ARBITRARY=1
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.channelmarket-pma.rule=Host(`db.${APP_DOMAIN:-channelmarket.net}`)"
      - "traefik.http.routers.channelmarket-pma.entrypoints=websecure"
      - "traefik.http.routers.channelmarket-pma.tls.certresolver=letsencrypt"
      - "traefik.docker.network=proxy"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

networks:
  internal:
    driver: bridge
  proxy:
    external: true

volumes:
  dbdata:
    driver: local
  app-storage:
    driver: local
  app-logs:
    driver: local
  mailpit-data:
    driver: local
