name: Database Backups

on:
  schedule:
    - cron: '0 0 * * *' # Tous les jours à minuit
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
    - name: Connect to VPS and run backup
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_SSH_PORT || 22 }}
        script: |
          cd ${{ secrets.VPS_PATH }}
          
          # Créer le dossier de backups s'il n'existe pas
          mkdir -p backups
          
          # Variables
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          BACKUP_FILE="backups/db_backup_$TIMESTAMP.sql"
          
          echo "Démarrage de la sauvegarde de la base de données..."
          
          # Exécuter mysqldump via Docker
          # On récupère le mot de passe depuis le fichier .env
          DB_PASSWORD=$(grep DB_PASSWORD .env | cut -d '=' -f2)
          DB_NAME=$(grep DB_DATABASE .env | cut -d '=' -f2 | tr -d '\r')
          
          docker compose exec -T db mysqldump -u root -p"$DB_PASSWORD" "$DB_NAME" > $BACKUP_FILE
          
          if [ $? -eq 0 ]; then
            echo "✅ Sauvegarde réussie : $BACKUP_FILE"
            # Compresser le fichier
            gzip $BACKUP_FILE
            echo "📦 Compression terminée : $BACKUP_FILE.gz"
            
            # Nettoyage : Garder seulement les 7 derniers jours
            echo "Nettoyage des anciennes sauvegardes..."
            find backups/ -name "db_backup_*.sql.gz" -mtime +7 -delete
            echo "✨ Maintenance terminée."
          else
            echo "🚨 ERREUR : La sauvegarde a échoué."
            exit 1
          fi

    - name: Notification Succès (Email)
      if: success()
      run: |
        curl -X POST https://api.resend.com/emails \
          -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "noreply@channelmarket.net",
            "to": ["elfridayemadje5@gmail.com", "digitaleflex@gmail.com"],
            "subject": "💾 Sauvegarde RÉUSSIE - Channel Market",
            "html": "<h3>Sauvegarde terminée !</h3><p>La base de données de <b>Channel Market</b> a été sauvegardée avec succès sur le VPS.</p><p>Fichiers conservés : 7 derniers jours.</p>"
          }'

    - name: Notification Échec (Email)
      if: failure()
      run: |
        curl -X POST https://api.resend.com/emails \
          -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "from": "noreply@channelmarket.net",
            "to": ["elfridayemadje5@gmail.com", "digitaleflex@gmail.com"],
            "subject": "🚨 ÉCHEC de Sauvegarde - Channel Market",
            "html": "<h3>Attention !</h3><p>La sauvegarde automatique de la base de données a échoué sur le VPS.</p><p>Veuillez vérifier les logs GitHub Actions.</p>"
          }'
