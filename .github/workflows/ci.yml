name: CI & Security Scan

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd, intl
        coverage: none

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Run Linting (Pint)
      run: ./vendor/bin/pint --test

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM dependencies
      run: npm install

    - name: Build assets
      run: npm run build

    - name: Execute tests (Unit and Feature tests) via PHPUnit
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: ":memory:"
      run: php artisan test

  security-scans:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Composer Audit (PHP Security)
      run: composer audit

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: NPM Audit (JS Security)
      run: |
        npm install
        npm audit --audit-level=high

    - name: Local Secret Scan (Basic)
      run: |
        # Chercher des patterns de clés API ou mots de passe oubliés
        ! grep -rE "AI_KEY|GEMINI_KEY|DB_PASSWORD|MONEROO_KEY" app/ --exclude-dir=vendor
