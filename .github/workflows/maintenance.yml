name: System Maintenance

on:
  schedule:
    - cron: '0 3 * * 0' # Tous les dimanches à 3h du matin
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
    - name: SSH into VPS and clean up
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_SSH_PORT || 22 }}
        script: |
          cd ${{ secrets.VPS_PATH }}
          
          echo "🧹 Début de la maintenance hebdomadaire..."
          
          # Nettoyage Docker
          echo "Nettoyage des images Docker inutilisées..."
          docker image prune -af --filter "until=168h"
          docker volume prune -f
          
          # Nettoyage Laravel (dans le conteneur app)
          echo "Nettoyage des logs Laravel (fichiers > 30 jours)..."
          docker compose exec -T app find storage/logs -name "*.log" -mtime +30 -delete
          
          echo "Nettoyage des sessions expirées..."
          docker compose exec -T app php artisan session:table 2>/dev/null && docker compose exec -T app php artisan auth:clear-resets || echo "Pas de table session à nettoyer."
          
          echo "Optimisation de la base de données..."
          DB_PASSWORD=$(grep DB_PASSWORD .env | cut -d '=' -f2)
          DB_NAME=$(grep DB_DATABASE .env | cut -d '=' -f2 | tr -d '\r')
          docker compose exec -T db mysqloptimize -u root -p"$DB_PASSWORD" "$DB_NAME"
          
          echo "✨ Maintenance terminée avec succès."
